    function showFeedback(text, type) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.textContent = text;
      fb.className = 'feedback show ' + type;
    }

    function revealAnswer(markManual = true) {
      const box = document.getElementById('answerBox');
      if (box) box.classList.add('show');
    }

    function highlightOptions(info) {
      const correct = new Set(info.correctKeys);
      el.contentArea.querySelectorAll('.option').forEach(btn => {
        const key = btn.dataset.key;
        btn.classList.toggle('correct', correct.has(key));
        btn.classList.toggle('wrong', currentSelections.has(key) && !correct.has(key));
      });
    }

    function highlightYesNo(info) {
      el.contentArea.querySelectorAll('.yn').forEach(btn => {
        const num = btn.dataset.num;
        const val = btn.dataset.value;
        const selected = currentYesNo[num] === val;
        const correct = info.yesNoAnswers[num] === val;
        btn.classList.toggle('correct', correct);
        btn.classList.toggle('wrong', selected && !correct);
      });
    }

    function mark(result) {
      const q = filtered[currentPos];
      if (!q) return;
      setResult(result);
      revealAnswer(false);
      const info = getQuestionType(q);
      if (info.type === 'single' || info.type === 'multi') highlightOptions(info);
      if (info.type === 'yesno') highlightYesNo(info);
      showFeedback(result === 'correct' ? 'Đã tự chấm đúng.' : 'Đã tự chấm sai.', result === 'correct' ? 'good' : 'bad');
    }

    function move(delta) {
      if (!filtered.length) return;
      currentPos = (currentPos + delta + filtered.length) % filtered.length;
      renderCurrent();
      renderList();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function randomQuestion() {
      if (!filtered.length) return;
      currentPos = Math.floor(Math.random() * filtered.length);
      renderCurrent();
      renderList();
    }

    function toggleStar() {
      const q = filtered[currentPos];
      if (!q) return;
      const st = getQState(q.id);
      st.starred = !st.starred;
      saveState();
      refreshFilter(q.id);
    }

    function resetProgress() {
      const ok = confirm('Xóa toàn bộ tiến độ luyện thi trên trình duyệt này?');
      if (!ok) return;
      state = {};
      saveState();
      refreshFilter();
    }

    function copyAnswer() {
      const q = filtered[currentPos];
      if (!q) return;
      navigator.clipboard?.writeText(q.answer).then(() => {
        el.copyBtn.textContent = 'Đã copy';
        setTimeout(() => el.copyBtn.textContent = 'Copy đáp án', 900);
      }).catch(() => {
        alert(q.answer);
      });
    }

    function checkCurrent() {
      const q = filtered[currentPos];
      if (!q) return;
      const info = getQuestionType(q);
      if (info.type === 'multi') checkOptions(info);
      else if (info.type === 'yesno') checkYesNo(info);
      else revealAnswer(false);
    }

    el.mode.addEventListener('change', () => refreshFilter());
    el.search.addEventListener('input', () => refreshFilter());
    el.randomBtn.addEventListener('click', randomQuestion);
    el.resetBtn.addEventListener('click', resetProgress);
    el.prevBtn.addEventListener('click', () => move(-1));
    el.nextBtn.addEventListener('click', () => move(1));
    el.showBtn.addEventListener('click', () => revealAnswer(false));
    el.starBtn.addEventListener('click', toggleStar);
    el.copyBtn.addEventListener('click', copyAnswer);
    el.markCorrectBtn.addEventListener('click', () => mark('correct'));
    el.markWrongBtn.addEventListener('click', () => mark('wrong'));

    document.addEventListener('keydown', (e) => {
      const tag = document.activeElement?.tagName?.toLowerCase();
      if (tag === 'textarea' || tag === 'input' || tag === 'select') return;
      if (e.key === 'ArrowLeft') move(-1);
      if (e.key === 'ArrowRight') move(1);
      if (e.key.toLowerCase() === 's') toggleStar();
      if (e.code === 'Space') {
        e.preventDefault();
        revealAnswer(false);
      }
      if (e.key === 'Enter') {
        e.preventDefault();
        checkCurrent();
      }
      if (/^[1-8]$/.test(e.key)) {
        const q = filtered[currentPos];
        if (!q) return;
        const info = getQuestionType(q);
        if (info.type !== 'single' && info.type !== 'multi') return;
        const opt = info.options[Number(e.key) - 1];
        if (!opt) return;
        if (info.type === 'single') {
          currentSelections = new Set([opt.key]);
          getQState(q.id).selected = [opt.key];
          saveState();
          checkOptions(info);
        } else {
          const st = getQState(q.id);
          if (currentSelections.has(opt.key)) currentSelections.delete(opt.key);
          else currentSelections.add(opt.key);
          st.selected = Array.from(currentSelections);
          saveState();
          renderCurrent();
        }
      }
    });

    refreshFilter();
  </script>
</body>
</html>
